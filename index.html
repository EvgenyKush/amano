<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Квиты / Quits / A Mano</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Golos+Text:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F1F3EE; --card:#FFFFFF; --ink:#17251F; --ink-soft:#5A6B62;
  --deal:#2E7D5B; --deal-dark:#1F5C42; --xp:#DFA928; --remote:#3B6EA5;
  --line:#DCE2DA; --danger:#B4543C; --radius:14px;
  --dealL:#E3F0E9; --dealD:#1F5C42; --goldL:#FDF6E1;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Golos Text',system-ui,sans-serif;background:var(--paper);color:var(--ink);
  -webkit-font-smoothing:antialiased;font-size:15px;
}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.screen{display:none;min-height:100dvh;padding-bottom:76px}
.screen.active{display:flex;flex-direction:column}
.mono{font-family:'JetBrains Mono',monospace;font-weight:500}

.langsw{
  position:fixed;top:14px;right:14px;z-index:50;display:flex;
  background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px;
  box-shadow:0 2px 10px rgba(23,37,31,.06);
}
.langsw button{
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;
  padding:5px 10px;border-radius:999px;color:var(--ink-soft);transition:all .15s;
}
.langsw button.on{background:var(--ink);color:#fff}

.nav{
  position:fixed;bottom:0;left:0;right:0;z-index:40;
  background:var(--card);border-top:1px solid var(--line);
  display:flex;justify-content:space-around;padding:8px 0 max(10px,env(safe-area-inset-bottom));
}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:600;color:var(--ink-soft);transition:color .15s}
.nav button .ic{font-size:19px;line-height:1}
.nav button.on{color:var(--deal-dark)}

/* HOME */
#home{align-items:center;justify-content:center;padding:24px;text-align:center}
.logo{font-family:'Unbounded',sans-serif;font-weight:700;font-size:clamp(38px,9vw,60px);letter-spacing:-.02em}
.logo .swap{color:var(--deal);display:inline-block}
.tagline{color:var(--ink-soft);margin:10px 0 34px;font-size:16px}
.searchwrap{width:100%;max-width:560px}
.searchbar{
  display:flex;align-items:center;gap:10px;background:var(--card);
  border:1.5px solid var(--line);border-radius:999px;padding:15px 20px;
  box-shadow:0 4px 18px rgba(23,37,31,.07);transition:border-color .2s, box-shadow .2s;
}
.searchbar:focus-within{border-color:var(--deal);box-shadow:0 6px 24px rgba(46,125,91,.16)}
.searchbar svg{flex:none}
.searchbar input{flex:1;border:none;outline:none;font-size:17px;font-family:inherit;background:transparent;color:var(--ink);min-width:0}
.searchbar input::placeholder{color:#9AA8A0}
.go{background:var(--deal);color:#fff;border-radius:999px;padding:9px 18px;font-weight:600;font-size:15px;flex:none;transition:background .15s}
.go:active{background:var(--deal-dark)}
.cloudlbl{margin-top:34px;font-size:11.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-soft);font-weight:600}
.cloud{display:flex;flex-wrap:wrap;gap:6px 14px;justify-content:center;align-items:baseline;margin-top:26px;max-width:560px;line-height:1.9}
.tag{color:var(--ink);padding:2px 6px;border-radius:8px;transition:color .15s, background .15s;white-space:nowrap}
.tag:active,.tag:hover{color:var(--deal-dark);background:#E3F0E9}
.tag.t4:active,.tag.t4:hover{color:var(--danger);background:#F7E7E2}
.tag.t-hot:active,.tag.t-hot:hover{color:#8A6510;background:#FDF3DA}
.tag .n{font-family:'JetBrains Mono',monospace;font-size:.62em;color:var(--ink-soft);font-weight:500;margin-left:3px;vertical-align:super}
.t1{font-size:22px;font-weight:600;color:var(--deal-dark)}
.t2{font-size:18px;font-weight:600;color:var(--deal)}
.t3{font-size:15.5px;font-weight:500}
.t4{font-size:13.5px;color:var(--danger)}
.t4 .n{color:var(--danger)}
.t-hot{color:var(--xp);font-weight:600}
.t-hot .n{color:var(--xp)}
.mystatus{margin-top:44px;font-size:13.5px;color:var(--ink-soft);display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center}
.dot{width:8px;height:8px;border-radius:50%;background:var(--deal);flex:none}

.badge{font-size:11px;font-weight:600;padding:2.5px 8px;border-radius:6px;letter-spacing:.02em}
.b-ver{background:#E3F0E9;color:var(--deal-dark)}
.b-conf{background:#FDF3DA;color:#8A6510}
.b-decl{background:#EEF0EE;color:var(--ink-soft)}
.b-mentor{background:#EAF0F7;color:var(--remote)}
.karma{font-size:11px;font-weight:600;padding:2.5px 8px;border-radius:6px;letter-spacing:.02em;display:inline-flex;align-items:center;gap:4px}
.k-high{background:#E3F0E9;color:var(--deal-dark)}
.k-norm{background:#EEF0EE;color:var(--ink-soft)}
.k-low{background:#F7E7E2;color:var(--danger)}

/* RESULTS */
.topbar{position:sticky;top:0;z-index:10;background:var(--paper);padding:12px 16px 0;border-bottom:1px solid var(--line)}
.toprow{display:flex;align-items:center;gap:10px;padding-right:126px}
.minilogo{font-family:'Unbounded',sans-serif;font-weight:700;font-size:19px;flex:none}
.minilogo .swap{color:var(--deal)}
.searchbar.compact{padding:9px 14px;box-shadow:none;flex:1}
.searchbar.compact input{font-size:15px}
.chips{display:flex;gap:8px;overflow-x:auto;padding:12px 0 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:13.5px;color:var(--ink);display:flex;align-items:center;gap:6px;transition:all .15s}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.morefilters{background:var(--card);border-bottom:1px solid var(--line);padding:16px;display:none}
.morefilters.open{display:block}
.frow{margin-bottom:16px}
.frow:last-child{margin-bottom:0}
.flabel{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);font-weight:600;margin-bottom:8px}
.fopts{display:flex;flex-wrap:wrap;gap:7px}
.fopt{border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:13.5px;background:var(--paper);color:var(--ink);transition:all .15s}
.fopt.on{background:var(--deal);border-color:var(--deal);color:#fff}
.resmeta{padding:14px 16px 4px;font-size:13.5px;color:var(--ink-soft);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.reslist{padding:10px 16px 40px;display:flex;flex-direction:column;gap:12px;max-width:640px;width:100%;margin:0 auto}
.rcard{background:var(--card);border-radius:var(--radius);border:1px solid var(--line);overflow:hidden;text-align:left;width:100%;transition:transform .12s}
.rcard:active{transform:scale(.985)}
.rtop{padding:14px 16px 12px;display:flex;gap:12px;align-items:flex-start}
.ava{width:44px;height:44px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:17px;color:#fff}
.rname{font-weight:600;font-size:15.5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rskill{font-size:14px;color:var(--ink-soft);margin-top:2px}
.rmeta{display:flex;flex-wrap:wrap;gap:5px 14px;font-size:13px;color:var(--ink-soft);padding:0 16px 12px;align-items:center}
.rmeta .free{color:var(--deal);font-weight:600}
.rmeta .busy{color:var(--danger);font-weight:600}
.kvitline{border-top:1.5px dashed var(--line);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;background:linear-gradient(0deg,#FBFCFA,#FFF)}
.kvitline .eq{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14.5px}
.kvitline .eq .swap{color:var(--deal);padding:0 4px}
.kvitline .xp{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--xp);background:#FDF6E1;border-radius:6px;padding:3px 8px}
.stars{color:var(--xp);letter-spacing:1px}

/* PROFILE / cards */
.pbar{position:sticky;top:0;z-index:10;background:var(--paper);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:12px}
.back{font-size:15px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:6px}
.pbody{max-width:640px;width:100%;margin:0 auto;padding:20px 16px 48px}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.phead{display:flex;gap:14px;align-items:center;margin-bottom:14px}
.ava.big{width:60px;height:60px;font-size:23px}
.pname{font-family:'Unbounded',sans-serif;font-weight:500;font-size:19px}
.psub{font-size:13.5px;color:var(--ink-soft);margin-top:3px}
.pstats{display:flex;border-top:1px solid var(--line);padding-top:14px}
.pstat{flex:1;text-align:center}
.pstat .v{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:17px}
.pstat .k{font-size:11.5px;color:var(--ink-soft);margin-top:3px}
.sect{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);font-weight:600;margin:20px 4px 10px}
.ladder{display:flex;margin-top:6px}
.step{flex:1;text-align:center;position:relative}
.step .pt{width:14px;height:14px;border-radius:50%;background:var(--line);margin:0 auto 6px;position:relative;z-index:2;border:3px solid var(--card)}
.step.done .pt{background:var(--deal)}
.step .lbl{font-size:11px;color:var(--ink-soft)}
.step.done .lbl{color:var(--deal-dark);font-weight:600}
.step::before{content:'';position:absolute;top:5.5px;left:-50%;width:100%;height:3px;background:var(--line);z-index:1}
.step:first-child::before{display:none}
.step.done::before{background:var(--deal)}
.bnote{font-size:12.5px;color:var(--ink-soft);margin:13px 2px 0;line-height:1.45;display:flex;gap:7px;align-items:flex-start}
.bnote.warn{color:#8A6510}
.recov{border:1.5px solid var(--danger);background:#FDF7F5;border-radius:10px;padding:12px 14px;margin-top:14px;font-size:13px;line-height:1.5}
.recov b{color:var(--danger)}

.builder{background:var(--card);border:1.5px solid var(--deal);border-radius:var(--radius);padding:18px;box-shadow:0 6px 22px rgba(46,125,91,.12)}
.btitle{font-weight:600;font-size:15.5px;margin-bottom:14px}
.bside{background:var(--paper);border-radius:10px;padding:13px 14px}
.bwho{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);font-weight:600;margin-bottom:6px}
.bwhat{font-weight:500;font-size:14.5px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.bwhat select{font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:8px;padding:7px 10px;background:var(--card);color:var(--ink);flex:1;min-width:0}
.hourpick{display:flex;align-items:center;gap:10px;flex:none}
.hbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--card);font-size:17px;font-weight:600;display:flex;align-items:center;justify-content:center}
.hval{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;min-width:38px;text-align:center}
.bswap{text-align:center;margin:9px 0;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:20px;color:var(--deal)}
.propose{width:100%;margin-top:15px;background:var(--deal);color:#fff;border-radius:11px;padding:14px;font-weight:600;font-size:15.5px;transition:all .15s}
.propose:active{background:var(--deal-dark)}
.propose:disabled{background:var(--line);color:var(--ink-soft)}
.propose.sec{background:var(--card);color:var(--deal-dark);border:1.5px solid var(--deal)}

/* DASHBOARD */
.debt{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--line)}
.debt:last-child{border-bottom:none}
.debt .dl{font-weight:500;font-size:14.5px}
.debt .ds{font-size:12.5px;color:var(--ink-soft);margin-top:3px}
.st{font-size:11px;font-weight:600;padding:2.5px 8px;border-radius:6px;white-space:nowrap;flex:none}
.st-half{background:#FDF3DA;color:#8A6510}
.st-wait{background:#EEF0EE;color:var(--ink-soft)}
.ringcard{background:var(--card);border:1.5px solid var(--xp);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:0 6px 22px rgba(223,169,40,.14)}
.ringtitle{font-weight:600;font-size:15.5px;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ringrow{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:14px}
.ringrow .mini{width:32px;height:32px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:#fff}
.ringrow .arr{color:var(--xp);font-family:'JetBrains Mono',monospace;font-weight:700}
.matchcard{background:var(--card);border:1.5px solid var(--remote);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:0 6px 22px rgba(59,110,165,.14)}
.mrow{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:14px}
.mrow .mini{width:32px;height:32px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:#fff}
.mrow .marr{color:var(--remote);font-family:'JetBrains Mono',monospace;font-weight:700}
.invn{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:26px;color:var(--deal-dark)}
.slot{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}
.slot:last-child{border-bottom:none}
.slot .taken{color:var(--ink-soft);font-size:12.5px}
.slotbtn{background:var(--deal);color:#fff;border-radius:8px;padding:7px 13px;font-weight:600;font-size:13px;flex:none}
.ptype{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;border-radius:6px}
.pt-ex{background:#EAF0F7;color:var(--remote)}
.pt-vol{background:#E3F0E9;color:var(--deal-dark)}
.prog{height:7px;background:var(--paper);border-radius:99px;overflow:hidden;margin-top:10px}
.prog i{display:block;height:100%;background:var(--deal);border-radius:99px}

/* CHAT */
.chathead{position:sticky;top:0;z-index:10;background:var(--paper);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:10px}
.chatmeta{flex:1;min-width:0}
.chatname{font-weight:600;font-size:15px}
.chatdeal{font-size:11.5px;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stpill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;background:#EAF0F7;color:var(--remote);white-space:nowrap}
.chatwrap{display:flex;flex-direction:column;flex:1;max-width:640px;width:100%;margin:0 auto;padding:0 16px}
.msgs{flex:1;display:flex;flex-direction:column;gap:10px;padding:16px 0}
.bub{max-width:78%;padding:9px 13px;border-radius:14px;font-size:14px;line-height:1.4}
.bub.them{background:var(--card);border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:4px}
.bub.me{background:var(--deal);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.tplcard{max-width:86%;background:var(--card);border:1.5px solid var(--deal);border-radius:12px;padding:11px 13px;font-size:13.5px;line-height:1.4}
.tplcard.them{align-self:flex-start}
.tplcard.me{align-self:flex-end;border-color:var(--dealD);background:var(--dealL)}
.tplcard .tl{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--deal);margin-bottom:4px}
.tplbtns{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
.tplbtns button{background:var(--deal);color:#fff;border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:600}
.tplbtns button.sec{background:var(--paper);color:var(--ink);border:1px solid var(--line)}
.safety{max-width:92%;align-self:center;background:var(--card);border:1.5px solid var(--remote);border-radius:12px;padding:12px 14px;font-size:12.5px;line-height:1.5;color:var(--ink)}
.safety .st1{font-weight:700;color:var(--remote);margin-bottom:4px;font-size:12.5px}
.safety .shrow{display:flex;gap:7px;margin-top:9px}
.safety input{flex:1;min-width:0;border:1px solid var(--remote);border-radius:8px;padding:7px 11px;font-family:inherit;font-size:12.5px;background:var(--card);outline:none;color:var(--ink)}
.safety button{background:var(--remote);border:none;color:#fff;border-radius:8px;padding:7px 13px;font-size:12px;font-weight:600;flex:none}
.safety .shared{margin-top:9px;color:var(--deal);font-weight:600;font-size:12px}
.sysmsg{align-self:center;text-align:center;font-size:11.5px;color:var(--ink-soft);background:var(--card);border:1px dashed var(--line);border-radius:999px;padding:5px 14px;max-width:92%}
.sysmsg.warn{color:#8A6510;border-color:var(--xp);background:var(--goldL,#FDF6E1)}
.chatbar{position:sticky;bottom:76px;background:var(--paper);padding:8px 0 6px;border-top:1px solid var(--line)}
.tplchips{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.tplchips::-webkit-scrollbar{display:none}
.tplchip{flex:none;background:var(--dealL);border:1px solid var(--deal);color:var(--dealD);border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:600}
.freerow{display:flex;gap:8px}
.freerow input{flex:1;border:1.5px solid var(--line);border-radius:999px;padding:10px 15px;font-family:inherit;font-size:14px;background:var(--card);outline:none;min-width:0;color:var(--ink)}
.freerow input:focus{border-color:var(--deal)}
.sendbtn{width:42px;height:42px;border-radius:50%;background:var(--deal);color:#fff;font-size:18px;font-weight:700;flex:none}

.toast{
  position:fixed;bottom:86px;left:50%;transform:translate(-50%,80px);
  background:var(--ink);color:#fff;border-radius:12px;padding:13px 20px;font-size:14.5px;
  opacity:0;transition:all .3s;z-index:99;max-width:calc(100% - 40px);text-align:center;
}
.toast.show{transform:translate(-50%,0);opacity:1}
.demobar{
  position:fixed;top:0;left:0;right:0;z-index:60;background:var(--ink);color:#fff;
  font-size:12px;padding:7px 14px;display:flex;align-items:center;justify-content:center;
  gap:12px;flex-wrap:wrap;text-align:center;
}
.demobar a{color:#A8E6C3;text-decoration:none;font-weight:600}
.demobar button{color:#fff;text-decoration:underline;font-size:12px;opacity:.85}
body{padding-top:34px}
.langsw{top:42px}
.philo{max-width:520px;margin:0 auto 28px;display:flex;flex-direction:column;gap:8px;text-align:left}
.philoline{font-size:13.5px;color:var(--ink-soft);padding:10px 14px;background:var(--card);border:1px solid var(--line);border-radius:10px;line-height:1.45}
.philoline b{color:var(--deal-dark);font-weight:600}
.screenhead{
  position:sticky;top:34px;z-index:9;background:var(--paper);border-bottom:1px solid var(--line);
  padding:14px 16px;font-family:'Unbounded',sans-serif;font-weight:500;font-size:17px;
}
.mystatus{cursor:pointer;transition:opacity .15s}
.mystatus:hover{opacity:.75}
.bnote.eqwarn{color:#8A6510;background:var(--goldL);padding:10px 12px;border-radius:8px;margin-top:10px}
.modalov{
  position:fixed;inset:0;z-index:100;background:rgba(23,37,31,.45);display:none;
  align-items:center;justify-content:center;padding:20px;
}
.modalov.open{display:flex}
.modal{background:var(--card);border-radius:var(--radius);padding:20px;max-width:360px;width:100%;box-shadow:0 12px 40px rgba(23,37,31,.18)}
.modal p{font-size:14.5px;line-height:1.5;margin-bottom:16px}
.modalacts{display:flex;gap:10px}
.modalacts button{flex:1;padding:12px;border-radius:10px;font-weight:600;font-size:14px}
.modalacts .yes{background:var(--deal);color:#fff}
.modalacts .no{background:var(--paper);border:1px solid var(--line);color:var(--ink)}
.st-fixed{background:#E3F0E9;color:var(--deal-dark)}
.st-exec{background:#EAF0F7;color:var(--remote)}
.st-quits{background:var(--deal);color:#fff}
.dealnum{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--deal-dark)}
.ratingpick{display:flex;gap:6px;margin-top:10px}
.ratingpick button{font-size:18px;padding:4px 8px;border-radius:8px;border:1px solid var(--line);background:var(--paper)}
.ratingpick button.on{background:var(--goldL);border-color:var(--xp)}
.skillslist{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.skilltag{background:var(--dealL);color:var(--dealD);padding:6px 11px;border-radius:999px;font-size:13px;font-weight:500}
.needtag{background:#EAF0F7;color:var(--remote);padding:6px 11px;border-radius:999px;font-size:13px;font-weight:500}
.btnrow{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.btnrow button{flex:1;min-width:120px;padding:12px;border-radius:10px;font-weight:600;font-size:14px}
.btn-pause{background:var(--paper);border:1.5px solid var(--line);color:var(--ink)}
.btn-resume{background:var(--deal);color:#fff}
.pausedbanner{background:#F7E7E2;color:var(--danger);padding:12px 16px;border-radius:10px;font-size:13.5px;margin-bottom:14px;text-align:center}
@media (max-width:480px){.toprow{padding-right:0;flex-wrap:wrap}.langsw{top:38px;right:8px}}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}

<body>

<div class="demobar" id="demobar"></div>

<div class="langsw">
  <button id="lru" class="on" onclick="setLang('ru')">RU</button>
  <button id="len" onclick="setLang('en')">EN</button>
  <button id="les" onclick="setLang('es')">ES</button>
</div>

<div class="screen active" id="home">
  <div class="logo" id="biglogo"></div>
  <div class="tagline" id="tagline"></div>
  <div class="philo" id="philo"></div>
  <div class="searchwrap">
    <form class="searchbar" onsubmit="goSearch(event)">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#9AA8A0" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" type="text" autocomplete="off">
      <button class="go" type="submit" id="gobtn"></button>
    </form>
  </div>
  <div class="cloudlbl" id="cloudlbl"></div>
  <div class="cloud" id="cloud"></div>
  <div class="mystatus" id="mystatus" onclick="openMe()" title=""></div>
</div>

<div class="screen" id="me">
  <div class="pbar">
    <button class="back" onclick="show('home')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      <span id="meback"></span>
    </button>
  </div>
  <div class="pbody" id="mebody"></div>
</div>

<div class="screen" id="results">
  <div class="topbar">
    <div class="toprow">
      <button class="minilogo" id="minilogo" onclick="show('home')"></button>
      <form class="searchbar compact" onsubmit="refresh(event)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9AA8A0" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="q2" type="text" autocomplete="off">
      </form>
    </div>
    <div class="chips" id="chips"></div>
  </div>
  <div class="morefilters" id="morefilters"></div>
  <div class="resmeta"><span id="rescount"></span><span id="resgeo"></span></div>
  <div class="reslist" id="reslist"></div>
</div>

<div class="screen" id="profile">
  <div class="pbar">
    <button class="back" onclick="show('results')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      <span id="backlbl"></span>
    </button>
  </div>
  <div class="pbody" id="pbody"></div>
</div>

<div class="screen" id="projects">
  <div class="screenhead" id="projhead"></div>
  <div class="pbody" id="projbody" style="padding-top:0"></div>
</div>
<div class="screen" id="dash">
  <div class="screenhead" id="dashhead"></div>
  <div class="pbody" id="dashbody" style="padding-top:0"></div>
</div>

<div class="screen" id="chat">
  <div class="chathead">
    <button class="back" onclick="show('dash')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="ava" id="chatava" style="background:#2E7D5B;width:38px;height:38px;font-size:14px"></div>
    <div class="chatmeta">
      <div class="chatname" id="chatname"></div>
      <div class="chatdeal" id="chatdeal"></div>
    </div>
    <span class="stpill" id="chatst"></span>
  </div>
  <div class="chatwrap">
    <div class="msgs" id="msgs"></div>
    <div class="chatbar">
      <div class="tplchips" id="tplchips"></div>
      <div class="freerow">
        <input id="freetxt" type="text" onkeydown="if(event.key==='Enter')sendFree()">
        <button class="sendbtn" onclick="sendFree()">↑</button>
      </div>
    </div>
  </div>
</div>

<div class="nav">
  <button id="nav-home" class="on" onclick="navTo('home')"><span class="ic">🔍</span><span id="nl1"></span></button>
  <button id="nav-projects" onclick="navTo('projects')"><span class="ic">🤝</span><span id="nl2"></span></button>
  <button id="nav-dash" onclick="navTo('dash')"><span class="ic">⇄</span><span id="nl3"></span></button>
</div>

<div class="toast" id="toast"></div>

<div class="modalov" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <p id="modaltext"></p>
    <div class="modalacts">
      <button class="no" id="modalno" onclick="closeModal()"></button>
      <button class="yes" id="modalyes"></button>
    </div>
  </div>
</div>

let userPaused=false, pendingProposeName='', selectedRating=0, chatWaitingConfirm=false;
const t=()=>T[lang];

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}

function setLang(l){
  lang=l;localStorage.setItem('kvity_lang',l);
  document.documentElement.lang=l;
  ['ru','en','es'].forEach(k=>document.getElementById('l'+k).classList.toggle('on',l===k));
  renderStatic();
  if(isOn('results'))renderResults();
  if(isOn('profile')&&openProfileId)openProfile(openProfileId,false);
  if(isOn('me'))renderMe();
  if(isOn('projects'))renderProjects();
  if(isOn('dash'))renderDash();
  if(isOn('chat'))renderChat();
}
const isOn=id=>document.getElementById(id).classList.contains('active');

function renderStatic(){
  const x=t();
  document.getElementById('demobar').innerHTML=
    `${x.demobar}<a href="https://t.me/" target="_blank" rel="noopener">${x.tglink}</a> · <button type="button" onclick="resetDemo()">${x.demoreset}</button>`;
  document.getElementById('biglogo').innerHTML=x.logo;
  document.getElementById('minilogo').innerHTML=x.mini;
  document.getElementById('tagline').textContent=x.tagline;
  document.getElementById('philo').innerHTML=x.philo.map(p=>`<div class="philoline">${p}</div>`).join('');
  document.getElementById('q').placeholder=x.ph;
  document.getElementById('gobtn').textContent=x.go;
  document.getElementById('cloudlbl').textContent=x.cloudlbl;
  renderMyStatus();
  document.getElementById('backlbl').textContent=x.back;
  document.getElementById('meback').textContent=x.meback;
  document.getElementById('resgeo').textContent=x.geo;
  document.getElementById('q2').placeholder=x.ph;
  document.getElementById('projhead').textContent=x.pTitle;
  document.getElementById('dashhead').textContent=x.dTitle;
  document.getElementById('modalno').textContent=x.modalNo;
  ['nl1','nl2','nl3'].forEach((id,i)=>document.getElementById(id).textContent=x.nav[i]);
  renderCloud();renderChips();renderFilters();
}
function renderMyStatus(){
  const x=t(), el=document.getElementById('mystatus');
  if(userPaused){
    el.innerHTML=`<span class="dot" style="background:var(--danger)"></span> ${x.statusPaused}`;
    el.title=x.btnResume;
  }else{
    el.innerHTML=`<span class="dot"></span> ${x.statusFree.replace('{debts}','1').replace('{limit}',CONFIG.debtLimit)}`;
    el.title=x.meTitle;
  }
}
function renderCloud(){
  document.getElementById('cloud').innerHTML=CLOUD.map(c=>
    `<button type="button" class="tag ${c.c}" data-q="${esc(c.q[lang])}">${c[lang]}<span class="n">${c.n}</span></button>`
  ).join('');
  document.getElementById('cloud').onclick=e=>{
    const btn=e.target.closest('[data-q]');
    if(btn)hintSearch(btn.dataset.q);
  };
}
function renderChips(){
  const on={};document.querySelectorAll('.chip.on[data-f]').forEach(c=>on[c.dataset.f]=1);
  const moreOn=document.getElementById('morefilters').classList.contains('open');
  const x=t().chips;
  document.getElementById('chips').innerHTML=
    ['near','free','verified','remote','mentor'].map(k=>
      `<button class="chip ${on[k]?'on':''}" data-f="${k}" onclick="toggleChip(this)">${x[k]}</button>`
    ).join('')+`<button class="chip ${moreOn?'on':''}" onclick="toggleMore(this)">${x.more}</button>`;
}
function renderFilters(){
  const el=document.getElementById('morefilters');
  const prev=[...el.querySelectorAll('.fopts')].map(g=>[...g.children].findIndex(o=>o.classList.contains('on')));
  el.innerHTML=t().frows.map((r,i)=>`
    <div class="frow"><div class="flabel">${r.l}</div>
    <div class="fopts">${r.o.map((o,j)=>`<button class="fopt ${(prev[i]??r.d)===j?'on':''}" onclick="pickOpt(this)">${o}</button>`).join('')}</div></div>
  `).join('');
}
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const navMap={home:'nav-home',results:'nav-home',profile:'nav-home',me:'nav-home',projects:'nav-projects',dash:'nav-dash',chat:'nav-dash'};
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('on'));
  document.getElementById(navMap[id]).classList.add('on');
  window.scrollTo(0,0);
}
function navTo(id){
  if(id==='projects')renderProjects();
  if(id==='dash')renderDash();
  show(id);
}
function hintSearch(q){document.getElementById('q').value=q;goSearch();}
function goSearch(e){
  if(e)e.preventDefault();
  currentQuery=document.getElementById('q').value||CLOUD[0].q[lang];
  document.getElementById('q2').value=currentQuery;
  renderResults();show('results');
}
function refresh(e){e.preventDefault();currentQuery=document.getElementById('q2').value;renderResults();}
function toggleChip(el){el.classList.toggle('on');renderResults();}
function toggleMore(el){document.getElementById('morefilters').classList.toggle('open');el.classList.toggle('on');}
function pickOpt(el){el.parentElement.querySelectorAll('.fopt').forEach(o=>o.classList.remove('on'));el.classList.add('on');renderResults();}
function activeFilters(){const f={};document.querySelectorAll('.chip.on[data-f]').forEach(c=>f[c.dataset.f]=true);return f;}

function renderResults(){
  const f=activeFilters(),x=t();
  const q=currentQuery.toLowerCase().trim();
  let list=PEOPLE.filter(p=>{
    if(userPaused)return false;
    if(f.near&&!p.near)return false;
    if(f.free&&!p.isFree)return false;
    if(f.verified&&p.badge.cls!=='b-ver')return false;
    if(f.remote&&!p.remote)return false;
    if(f.mentor&&p.badge.cls!=='b-mentor')return false;
    if(q){
      const hay=(p.name[lang]+' '+p.skill[lang]).toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  });
  const rank={high:0,norm:1,low:2};
  list=[...list].sort((a,b)=>rank[a.karma]-rank[b.karma]);
  document.getElementById('rescount').textContent=x.found(list.length,currentQuery);
  document.getElementById('reslist').innerHTML=list.map(p=>`
    <button class="rcard" onclick="openProfile(${p.id})">
      <div class="rtop">
        <div class="ava" style="background:${p.color}">${p.init[lang]}</div>
        <div>
          <div class="rname">${p.name[lang]} <span class="badge ${p.badge.cls}">${p.badge[lang]}</span></div>
          <div class="rskill">${p.skill[lang]}</div>
        </div>
      </div>
      <div class="rmeta">
        <span class="${p.recovery?'busy':(p.isFree?'free':'busy')}">● ${p.free[lang]}</span>
        <span class="karma k-${p.karma}">${x.karma[p.karma]}</span>
        <span>📍 ${p.dist[lang]}</span>
        ${p.rating?`<span><span class="stars">★</span> ${p.rating} · ${p.deals} ${x.deals}${p.local?` · <b>${p.local} ${x.inCity}</b>`:''}</span>`:`<span>${x.firstDeal}</span>`}
      </div>
      <div class="kvitline">
        <span class="eq">${p.eq[lang]}<span class="swap">⇄</span>${x.yourHours}</span>
        ${p.xp[lang]?`<span class="xp">${p.xp[lang]}</span>`:''}
      </div>
    </button>
  `).join('')||`<div style="text-align:center;color:var(--ink-soft);padding:40px 0">${userPaused?(lang==='ru'?'Профиль на паузе — снимите паузу в «Мой профиль»':lang==='es'?'Perfil en pausa — reanudá en «Mi perfil»':'Profile paused — resume in My profile'):x.empty}</div>`;
}

function chg(side,d){
  const x=t(),el=document.getElementById(side);
  let v=parseInt(el.textContent,10);
  v=Math.max(1,Math.min(8,v+d));
  el.textContent=v+' '+x.h;
  const th=parseInt(document.getElementById('their').textContent,10);
  const m=parseInt(document.getElementById('mine').textContent,10);
  const note=document.getElementById('eqnote');
  const ratio=Math.max(th,m)/Math.min(th,m);
  if(ratio<=2){
    note.textContent=x.eqOk;
    note.className='bnote';
  }else{
    note.textContent=x.eqWarn(th,m);
    note.className='bnote eqwarn';
  }
}
function openModal(text,yesFn){
  document.getElementById('modaltext').textContent=text;
  const yesBtn=document.getElementById('modalyes');
  yesBtn.textContent=t().modalYes;
  yesBtn.onclick=()=>{closeModal();yesFn();};
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function propose(name){
  if(userPaused){toast(t().pausedBanner);return;}
  const th=parseInt(document.getElementById('their').textContent,10);
  const m=parseInt(document.getElementById('mine').textContent,10);
  const ratio=Math.max(th,m)/Math.min(th,m);
  const send=()=>{toast(t().toast(name));show('dash');renderDash();};
  if(ratio>2)openModal(t().eqWarn(th,m),send);
  else send();
}

function togglePause(){
  userPaused=!userPaused;
  renderMyStatus();
  if(isOn('me'))renderMe();
  if(isOn('results'))renderResults();
  toast(userPaused?t().pausedBanner:t().btnResume);
}
function resetDemo(){
  ringAgreed=false;matchSent=false;invites=3;slotTaken=false;joinedVol=false;
  userPaused=false;chatState='neg';chatMsgs=null;dealShared=false;selectedRating=0;chatWaitingConfirm=false;
  currentQuery='';openProfileId=null;
  document.getElementById('q').value='';
  document.getElementById('morefilters').classList.remove('open');
  document.querySelectorAll('.chip.on[data-f]').forEach(c=>c.classList.remove('on'));
  renderStatic();show('home');
  toast(lang==='ru'?'Демо сброшено':lang==='es'?'Demo reiniciado':'Demo reset');
}

function openChat(){
  if(!chatMsgs)initChat();
  renderChat();show('chat');
}
function initChat(){
  chatMsgs=[
    {k:'sys',key:'chatHint'},
    {k:'tpl',who:'them',key:'igorOffer',offer:true},
    {k:'bub',who:'them',key:'igorFree'},
  ];
}
function renderChat(){
  const x=t(), p=PEOPLE[0];
  const stCls={neg:'',fix:'st-fixed',exec:'st-exec',del:'st-half',quits:'st-quits'}[chatState]||'';
  document.getElementById('chatava').textContent=p.init[lang];
  document.getElementById('chatname').textContent=p.name[lang];
  document.getElementById('chatdeal').innerHTML=`<span class="dealnum">${x.dealNum}</span> · ${x.chatDeal}`;
  const stEl=document.getElementById('chatst');
  stEl.textContent=x.chatSt[chatState];
  stEl.className='stpill '+stCls;
  document.getElementById('freetxt').placeholder=x.inputPh;
  document.getElementById('msgs').innerHTML=chatMsgs.map(m=>{
    const txt=m.lit??(m.key?x[m.key]:'');
    if(m.k==='safety')return `<div class="safety"><div class="st1">${x.safetyTitle}</div>${x.safetyTxt}<div style="margin-top:8px;font-weight:600">${x.shareBtn}:</div>${dealShared?`<div class="shared">${x.shareDone}</div>`:`<div class="shrow"><input id="sharephone" type="tel" placeholder="${x.sharePh}" onkeydown="if(event.key==='Enter')sendShare()"><button type="button" onclick="sendShare()">${x.shareSend}</button></div>`}</div>`;
    if(m.k==='sys')return `<div class="sysmsg${m.warn?' warn':''}">${txt}</div>`;
    if(m.k==='bub')return `<div class="bub ${m.who}">${txt}</div>`;
    if(m.k==='rating')return `<div class="tplcard me"><div class="tl">${x.ratePartner}</div><div class="ratingpick" id="ratingpick">${[1,2,3,4,5].map(n=>`<button type="button" class="${selectedRating>=n?'on':''}" onclick="pickRating(${n})">★${n}</button>`).join('')}</div>${selectedRating?`<div class="tplbtns"><button type="button" onclick="submitQuits()">${x.tplQuits}</button></div>`:''}</div>`;
    const btns=(m.offer&&chatState==='neg')?`<div class="tplbtns"><button type="button" onclick="acceptOffer()">${x.acceptBtn}</button><button type="button" class="sec" onclick="toast(t().counterToast)">${x.counterBtn}</button></div>`:
      (m.confirmRecv&&chatWaitingConfirm)?`<div class="tplbtns"><button type="button" onclick="confirmRecv()">${x.tplConfirmRecv}</button></div>`:
      (m.confirm&&chatState==='del'&&!chatWaitingConfirm)?`<div class="tplbtns"><button type="button" onclick="startQuits()">${x.tplQuits}</button><button type="button" class="sec" onclick="toast(t().disputeToast)">${x.tplDispute}</button></div>`:'';
    return `<div class="tplcard ${m.who}"><div class="tl">${x.cardTl}</div>${txt}${btns}</div>`;
  }).join('');
  const chips={neg:['tplTime','tplPlace'],fix:['tplTime','tplPlace','tplStart'],exec:['tplStart'],del:[],quits:[]}[chatState];
  document.getElementById('tplchips').innerHTML=(chips||[]).map(c=>{
    const act={tplTime:"chatAct('time')",tplPlace:"chatAct('place')",tplStart:"chatAct('start')"}[c];
    return `<button type="button" class="tplchip" onclick="${act}">${x[c]}</button>`;
  }).join('');
  const msgsEl=document.getElementById('msgs');
  msgsEl.scrollTop=msgsEl.scrollHeight;
}
function confirmRecv(){
  chatWaitingConfirm=false;
  chatMsgs.push({k:'sys',key:'confirmReceived'},{k:'sys',key:'sysHalfDone'});
  renderChat();
}
function startQuits(){
  chatMsgs.push({k:'rating'});
  renderChat();
}
function pickRating(n){selectedRating=n;renderChat();}
function submitQuits(){
  if(!selectedRating)return;
  chatState='quits';
  chatMsgs=chatMsgs.filter(m=>m.k!=='rating');
  chatMsgs.push({k:'tpl',who:'me',key:'quitsCard'},{k:'sys',key:'sysQuits'});
  renderChat();
}
function acceptOffer(){
  chatState='fix';
  chatMsgs.push({k:'tpl',who:'me',key:'accepted'},{k:'sys',key:'sysFixed'},{k:'safety'});
  renderChat();
}
function chatAct(a){
  if(a==='time'){chatMsgs.push({k:'tpl',who:'me',key:'timeProposal'},{k:'bub',who:'them',key:'themOk'});}
  if(a==='place'){chatMsgs.push({k:'tpl',who:'me',key:'placeProposal'},{k:'bub',who:'them',key:'themOk'});}
  if(a==='start'){
    chatState='exec';
    chatMsgs.push({k:'tpl',who:'me',key:'startCard'},{k:'sys',key:'sysExec'});
    renderChat();
    setTimeout(()=>{
      chatState='del';
      chatWaitingConfirm=true;
      chatMsgs.push({k:'bub',who:'them',key:'igorDone'},{k:'tpl',who:'them',key:'deliveredCard',confirmRecv:true});
      renderChat();
    },1200);
    return;
  }
  if(a==='quits'){
    startQuits();
    return;
  }
  renderChat();
}
function sendShare(){
  const el=document.getElementById('sharephone');
  const ph=(el?.value||'').trim();
  if(ph.length<6){toast(t().shareErr);return;}
  dealShared=true;
  chatMsgs.push({k:'sys',lit:t().shareSms(ph)});
  renderChat();
  toast(t().shareToast);
}
function sendFree(){
  const el=document.getElementById('freetxt');
  const v=el.value.trim();
  if(!v)return;
  chatMsgs.push({k:'bub',who:'me',lit:v});
  if(/(\+?\d[\d\s\-()]{6,}|whats?app|telegram|viber|вотсап|ватсап|телег)/i.test(v)){
    chatMsgs.push({k:'sys',key:'bypassWarn',warn:true});
  }
  el.value='';
  renderChat();
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3400);
}

if(localStorage.getItem('kvity_lang'))setLang(lang);
else renderStatic();
</script>
